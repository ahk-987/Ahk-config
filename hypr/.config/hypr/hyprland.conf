#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,ara
    kb_variant =
    kb_model =
    kb_options = grp:alts_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true 
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace
gesture = 4, up,fullscreen
# gesture = 4,pinch,resize
gesture = 4, down ,float
# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, SHIFT M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, togglefloating,
bind = $mainMod+SHIFT,W, exec,killall swifty || ~/.config/hypr/scripts/swifty/swifty
bind = $mainMod, A, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, B, exec, $browser
bind = $mainMod, V, exec, nwg-clipman
bind = $mainMod, C, exec, code-insiders
bind = $mainMod, D, exec, discord 
bind = $mainMod, G, exec, github-desktop
bind = $mainMod + SHIFT, Q,forcekillactive,
bind = CTRL + SHIFT ,ESCAPE , exec ,killall btop || kitty --class btopfloat -e btop

bind = $mainMod, Y,  exec ,kitty -e yazi
bind = ALT ,tab, cyclenext,
bind = ALT + SHIFT,tab, cyclenext,prev
# bind = $mainMod + CTRL,a ,exec ,ani-cli

bind = ALT CTRL,W,exec ,killall waybar || waybar
bindul = ALT CTRL $mainMod, P, exec , systemctl poweroff
bindul = ALT CTRL $mainMod, R, exec , systemctl reboot
bindul = ALT CTRL $mainMod, S, exec , systemctl suspend



# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod,F,fullscreen,

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10



#this is silent moving workspace 
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

bind = $mainMod CTRL, left, workspace, -1
bind = $mainMod CTRL, right , workspace, +1


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# bind = CTRL + SHIFT, ESCAPE,togglespecialworkspace,btopws
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, sh -c 'wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && VOL=$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk "{print int(\$2*100)}") && notify-send -r 1000 "🔊 Volume: $VOL%"'

bindel = , XF86AudioLowerVolume, exec, sh -c 'wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && VOL=$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk "{print int(\$2*100)}") && notify-send -r 1000 "🔊 Volume: $VOL%"'

bindel = , XF86MonBrightnessUp, exec, sh -c 'brightnessctl set +5% && BR=$(brightnessctl get | awk "{print int(\$1*100/$(brightnessctl max))}") && notify-send -r 1001 "🌞 Brightness: $BR%"'

bindel = , XF86MonBrightnessDown, exec, sh -c 'brightnessctl --min-value=3553 set 5%- && BR=$(brightnessctl get | awk "{print int(\$1*100/$(brightnessctl max))}") && notify-send -r 1001 "🌞 Brightness: $BR%"'
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED && notify-send "🔇Speaker Muted" || notify-send "🔊Speaker Unmuted"
bindel = ,XF86AudioMicMute, exec,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle; wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | grep -q MUTED && notify-send "🔇Mic Muted" || notify-send "🔊 Mic Unmuted"
bind = $mainMod SHIFT , T,exec ,notify-send  "Current Time" "$(date '+%H:%M:%S')"
bind = $mainMod CTRL , T,exec ,notify-send  "$(date '+%A, %d %B %Y')" "$(date '+%H:%M:%S')"  
bind = $mainMod SHIFT , B , exec , notify-send "Battery" "$(cat /sys/class/power_supply/BAT0/capacity)% |  $(cat /sys/class/power_supply/BAT0/power_now) W"
# bind = $mainMod SHIFT,B ,exec ,notify-send "$(upower -i $(upower -e | grep BAT))"
# Laptop multimedia keys for volume and LCD brightness
# bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 2 @DEFAULT_AUDIO_SINK@ 5%+
# bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -n3% set 5%+ ||   $BR=`expr brightnessctl get \* 100 \/ brightnessctl max`||  notify-send " yo = $BR"
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl --min-value=3553 set 5%-

bind = $mainMod+ SHIFT, P, exec, tmp=$(mktemp /tmp/sattyXXXX.png) && grim -g "$(slurp)" "$tmp" && satty --filename "$tmp" ; rm "$tmp"
bind = , Print, exec, tmp=$(mktemp /tmp/sattyXXXX.png) && grim "$tmp" && satty --filename "$tmp" ; rm "$tmp"
# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful
windowrule = pin on, match:class ^(swifty)$
windowrule = float on, match:class ^(swifty)$
windowrule = no_blur on, match:class ^(swifty)$
windowrule = move ((monitor_w*0.06)) (monitor_h*0.83), match:class ^(swifty)$
windowrule = opacity 2.00 0.30, match:class ^(swifty)$

windowrule = no_blur on,match:class ^(vesktop)$
windowrule = opacity 0.98 0.95 ,match:class ^(vesktop)$
# windowrule = size 300 600 , match:class ^(swifty)$


# windowrule = opacity 0.9 0.8,no_blur on,match:class ^(kitty)$
windowrule = float on,match:class ^(btopfloat)$
windowrule = center on, match:class ^(btopfloat)$
windowrule = size 1600 900 ,match:class ^(btopfloat)$
# windowrule = workspace special:btopws ,match:class ^(btopfloat)$

windowrule = opacity 2.00 ,match:class ^(code-insiders)$
windowrule = opacity 2.00 ,match:class ^(nvim)$
windowrule = size 1600 900 , match:title ^(satty)$
windowrule = float off, match:class ^(ghidra)
windowrule = float on, match:title ^(satty)$
# windowrule = tile off ,match:title ^(satty)$
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
decoration:blur:enabled = false
decoration:shadow:enabled = false
misc:vfr = true
